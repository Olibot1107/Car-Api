<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Control Web App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .control-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .control-section h2 {
            margin-top: 0;
            color: #555;
        }
        .control-tip {
            margin-top: 8px;
            color: #666;
            font-size: 13px;
            line-height: 1.4;
        }
        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }
        button {
            padding: 10px 15px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-danger {
            background-color: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background-color: #c82333;
        }
        .btn-success {
            background-color: #28a745;
            color: white;
        }
        .btn-success:hover {
            background-color: #218838;
        }
        .btn-warning {
            background-color: #ffc107;
            color: black;
        }
        .btn-warning:hover {
            background-color: #e0a800;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-container label {
            display: block;
            margin-bottom: 5px;
        }
        .slider-container input[type="range"] {
            width: 100%;
        }
        .camera-container {
            text-align: center;
            margin: 20px 0;
        }
        .camera-feed {
            max-width: 100%;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #111;
        }
        .status-display {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .direction-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 10px;
            max-width: 260px;
            margin: 20px auto;
        }
        .direction-controls button {
            min-height: 68px;
            padding: 12px;
            font-size: 18px;
            font-weight: 700;
        }
        .direction-controls button:active,
        .btn-active {
            transform: scale(0.97);
            filter: brightness(1.08);
        }
        .center-btn {
            grid-column: 2;
            grid-row: 2;
        }
        .sensor-display {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            margin: 10px 0;
        }
        .led-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .led-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: all 0.3s;
        }
        .led-btn.active {
            border-color: #333;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        .red-led { background-color: #ff4444; }
        .green-led { background-color: #44ff44; }
        .blue-led { background-color: #4444ff; }

        /* Emergency stop button - always visible */
        .emergency-stop {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            background-color: #ff0000;
            border: 3px solid #cc0000;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .emergency-stop:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }
        .emergency-stop:active {
            transform: scale(0.95);
        }
        .emergency-stop.fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10001;
        }
    </style>
</head>
<body>
    <!-- Emergency Stop Button - Always Visible -->
    <button id="emergency-stop" class="emergency-stop" title="Emergency Stop - Stops car and shuts down app (Spacebar)">STOP</button>

    <div class="container">
        <h1>Car Control Web App</h1>

        <!-- Camera Feed -->
        <div class="control-section">
            <h2>Camera Feed</h2>
            <div class="camera-container">
                <img id="camera-feed" src="/camera_feed?width=320&height=240&quality=55&fps=12" class="camera-feed" alt="Camera Feed" loading="eager" decoding="async">
                <div style="text-align: center; margin-top: 10px;">
                    <button id="fullscreen-btn" class="btn-success">Full Screen</button>
                </div>
            </div>
        </div>

        <!-- Movement Controls -->
        <div class="control-section">
            <h2>Movement Controls</h2>
            <div class="control-tip">
                Use WASD or the arrow keys. Hold a direction to keep moving, release to stop.
            </div>

            <div class="slider-container">
                <label for="speed-slider">Speed: <span id="speed-value">50</span>%</label>
                <input type="range" id="speed-slider" min="0" max="100" value="50">
            </div>

            <div class="direction-controls">
                <button id="forward-left" class="btn-primary">↖</button>
                <button id="forward" class="btn-primary">↑</button>
                <button id="forward-right" class="btn-primary">↗</button>

                <button id="turn-left" class="btn-warning">←</button>
                <button id="stop" class="btn-danger center-btn">■</button>
                <button id="turn-right" class="btn-warning">→</button>

                <button id="backward-left" class="btn-primary">↙</button>
                <button id="backward" class="btn-primary">↓</button>
                <button id="backward-right" class="btn-primary">↘</button>
            </div>

            <div style="text-align: center; margin: 10px 0;">
                <button id="center-steering" class="btn-success">Center Steering</button>
            </div>
        </div>

        <!-- Outputs -->
        <div class="control-section">
            <h2>Outputs</h2>

            <div style="margin: 15px 0;">
                <h3>Buzzer</h3>
                <button id="buzzer-on" class="btn-warning">Buzzer On</button>
                <button id="buzzer-off" class="btn-secondary">Buzzer Off</button>
            </div>

            <div>
                <h3>LEDs</h3>
                <div class="led-controls">
                    <button id="led-red" class="led-btn red-led" data-led="red"></button>
                    <button id="led-green" class="led-btn green-led" data-led="green"></button>
                    <button id="led-blue" class="led-btn blue-led" data-led="blue"></button>
                </div>
            </div>
        </div>

        <!-- Status -->
        <div class="control-section">
            <h2>Status</h2>
            <div class="status-display">
                <div>Car Initialized: <span id="car-status">Checking...</span></div>
                <div>Steering Angle: <span id="steering-angle">0</span>°</div>
                <div>Speed: <span id="current-speed">0</span>%</div>
                <div>LED Red: <span id="led-red-status">Off</span></div>
                <div>LED Green: <span id="led-green-status">Off</span></div>
                <div>LED Blue: <span id="led-blue-status">Off</span></div>
                <div>Buzzer: <span id="buzzer-status">Off</span></div>
            </div>
            <button id="update-status" class="btn-primary">Update Status</button>
        </div>
    </div>

    <script>
        // Speed slider
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');

        speedSlider.addEventListener('input', function() {
            speedValue.textContent = this.value;
        });

        // Control functions
        async function sendCommand(action, data = {}) {
            try {
                data.speed = parseInt(speedSlider.value);
                const response = await fetch(`/control/${action}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (!result.success) {
                    console.error('Command failed:', result.error);
                    // Don't show alerts for keyboard commands to avoid spam
                }
                return result;
            } catch (error) {
                console.error('Network error:', error);
            }
        }

        // Keyboard control state
        const keysPressed = new Set();

        // Keyboard event handlers
        document.addEventListener('keydown', function(event) {
            const key = event.key.toLowerCase();
            if (!keysPressed.has(key)) {
                keysPressed.add(key);
                handleKeyPress(key);
            }
        });

        document.addEventListener('keyup', function(event) {
            const key = event.key.toLowerCase();
            keysPressed.delete(key);
            handleKeyRelease(key);
        });

        function handleKeyPress(key) {
            switch(key) {
                // WASD for movement
                case 'w':
                case 'arrowup':
                    sendCommand('forward');
                    break;
                case 's':
                case 'arrowdown':
                    sendCommand('backward');
                    break;
                case 'd':
                case 'arrowright':
                    sendCommand('turn_left', {angle: 30});
                    break;
                case 'a':
                case 'arrowleft':
                    sendCommand('turn_right', {angle: 30});
                    break;
                case 'e':
                    sendCommand('center_steering');
                    break;
                // Space for emergency stop - kills everything
                case ' ':
                    fetch('/emergency_stop', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    }).catch(error => console.error('Emergency stop error:', error));
                    event.preventDefault(); // Prevent page scroll
                    break;
            }
        }

        function handleKeyRelease(key) {
            // Stop movement when keys are released
            if (['w', 's', 'a', 'd'].includes(key)) {
                // Only stop if no movement keys are pressed
                const movementKeys = ['w', 's', 'a', 'd'];
                const hasMovementKey = movementKeys.some(k => keysPressed.has(k));
                if (!hasMovementKey) {
                    sendCommand('stop');
                }
            }
        }

        // Emergency stop button - kills everything and shuts down app
        document.getElementById('emergency-stop').addEventListener('click', async () => {
            try {
                await fetch('/emergency_stop', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                // App will shut down, so no response expected
            } catch (error) {
                console.error('Emergency stop error:', error);
            }
        });

        // Button controls (still available for touch devices)
        function flashButton(id) {
            const button = document.getElementById(id);
            button.classList.add('btn-active');
            setTimeout(() => button.classList.remove('btn-active'), 120);
        }

        document.getElementById('forward').addEventListener('click', () => {
            flashButton('forward');
            sendCommand('forward');
        });
        document.getElementById('backward').addEventListener('click', () => {
            flashButton('backward');
            sendCommand('backward');
        });
        document.getElementById('stop').addEventListener('click', () => {
            flashButton('stop');
            sendCommand('stop');
        });
        document.getElementById('turn-left').addEventListener('click', () => {
            flashButton('turn-left');
            sendCommand('turn_left', {angle: 30});
        });
        document.getElementById('turn-right').addEventListener('click', () => {
            flashButton('turn-right');
            sendCommand('turn_right', {angle: 30});
        });
        document.getElementById('center-steering').addEventListener('click', () => {
            flashButton('center-steering');
            sendCommand('center_steering');
        });

        // Full screen camera
        document.getElementById('fullscreen-btn').addEventListener('click', function() {
            const img = document.querySelector('.camera-feed');
            if (img.requestFullscreen) {
                img.requestFullscreen();
            } else if (img.webkitRequestFullscreen) {
                img.webkitRequestFullscreen();
            } else if (img.msRequestFullscreen) {
                img.msRequestFullscreen();
            }
        });

        // Buzzer controls
        document.getElementById('buzzer-on').addEventListener('click', () => sendCommand('buzzer_on', {frequency: 2000}));
        document.getElementById('buzzer-off').addEventListener('click', () => sendCommand('buzzer_off'));

        // LED controls
        document.querySelectorAll('.led-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const led = this.dataset.led;
                const isActive = this.classList.contains('active');
                this.classList.toggle('active');
                sendCommand(`led_${led}`, {state: !isActive});
            });
        });

        // Status updates
        async function updateStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                document.getElementById('car-status').textContent = data.car_initialized ? 'Yes' : 'No';
                document.getElementById('steering-angle').textContent = data.steering_angle;
                document.getElementById('current-speed').textContent = data.speed;
                document.getElementById('led-red-status').textContent = data.led_red ? 'On' : 'Off';
                document.getElementById('led-green-status').textContent = data.led_green ? 'On' : 'Off';
                document.getElementById('led-blue-status').textContent = data.led_blue ? 'On' : 'Off';
                document.getElementById('buzzer-status').textContent = data.buzzer_active ? 'On' : 'Off';
            } catch (error) {
                console.error('Error updating status:', error);
            }
        }

        document.getElementById('update-status').addEventListener('click', updateStatus);

        // Add instructions for keyboard controls
        const instructions = document.createElement('div');
        instructions.style.cssText = `
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 14px;
        `;
        instructions.innerHTML = `
            <strong>Keyboard Controls:</strong><br>
            <strong>Movement:</strong> W/↑=Forward, S/↓=Backward, A/←=Turn Left, D/→=Turn Right<br>
            <strong>Steering:</strong> E=Center Steering<br>
            <strong>Emergency Stop:</strong> Spacebar<br>
        `;
        document.querySelector('.container').insertBefore(instructions, document.querySelector('.container').firstChild.nextSibling);

        // Auto-update status every 2 seconds
        setInterval(() => {
            updateStatus();
        }, 2000);

        // Initial updates
        updateStatus();
    </script>
</body>
</html>
